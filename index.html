<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Identificação de Material do Cliente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --bg-card-hover: #1e2a4a;
            --accent: #2cb0e4;
            --accent-light: #ff6b6b;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --success: #2ecc71;
            --warning: #f39c12;
            --info: #3498db;
            --danger: #e74c3c;
            --glass: rgba(255,255,255,0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, rgba(81, 184, 234, 1) 0%, rgba(0, 0, 0, 1) 100%);
            /*background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);*/
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
        }

        .topbar {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 30px;
            background: radial-gradient(circle at center, rgb(0, 61, 110) 0%, rgb(2, 80, 104) 100%);
            border-radius: 12px;
            padding: 14px 18px;
            /*border: 1px solid rgba(255, 255, 255, 0.12);*/
        }

        .brand {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .brand-name {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            color: var(--text-primary);
            text-transform: uppercase;
            white-space: nowrap;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
        }

        .brand-logo {
            height: 42px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-left: auto;
        }

        .live {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.38);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4dff5c;
            box-shadow: 0 0 0 6px rgba(255, 77, 90, 0.25);
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 77, 90, 0.4);
            }
            50% {
                transform: scale(1.15);
                box-shadow: 0 0 0 8px rgba(255, 77, 90, 0);
            }
        }

        .clock {
            text-align: right;
            line-height: 1.1;
        }

        .mono {
            font-family: Consolas, "Courier New", monospace;
        }

        .clock .t {
            font-size: 1.35rem;
            font-weight: 700;
        }

        .clock .d {
            margin-top: 4px;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .controls button, .controls select {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .controls button {
            background: var(--accent);
            color: white;
            font-weight: 600;
        }

        .controls button:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(69, 187, 233, 0.4);
        }

        .controls select {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--accent);
        }

        .zones-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .zone {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .zone-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent);
        }

        .zone-header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .zone-title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .zone-title-label {
            color: white;
        }

        .zone-count {
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .zone-add-btn {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .zone-add-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .sub-sections {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .sub-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .sub-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .sub-section-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none;
        }

        .sub-section-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .sub-section-action-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .sub-section-action-btn:hover {
            background: rgba(255, 255, 255, 0.16);
            transform: translateY(-1px);
        }

        .sub-section-action-btn.delete {
            color: #ff7a7a;
        }

        .sub-section-action-btn.delete:hover {
            background: rgba(231, 76, 60, 0.18);
        }

        .sub-section-cards {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            background: linear-gradient(145deg, #1e2a4a, #16213e);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid var(--accent);
            position: relative;
            overflow: hidden;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .card.status-nao-testado { border-left-color: var(--danger); }
        .card.status-em-teste { border-left-color: var(--warning); }
        .card.status-testado { border-left-color: var(--success); }

        .card-thumbnail {
            width: 180px;
            height: 180px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.1);
            background: var(--bg-dark);
        }

        .card-thumbnail-placeholder {
            width: 180px;
            height: 180px;
            border-radius: 8px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #2a3a5a, #1e2a4a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border: 2px dashed rgba(255,255,255,0.15);
            color: var(--text-secondary);
        }

        .card-body {
            flex: 1;
            min-width: 0;
        }

        .card-header-mini {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .card-cliente {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-status-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .status-nao-testado .card-status-badge { background: rgba(231, 76, 60, 0.2); color: var(--danger); }
        .status-em-teste .card-status-badge { background: rgba(243, 156, 18, 0.2); color: var(--warning); }
        .status-testado .card-status-badge { background: rgba(46, 204, 113, 0.2); color: var(--success); }

        .card-info-mini {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            font-size: 0.8rem;
        }

        .card-info-item {
            display: flex;
            flex-direction: column;
        }

        .card-info-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .card-info-value {
            color: var(--text-primary);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-actions {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }

        .card-action-btn {
            flex: 1;
            padding: 5px;
            border: none;
            border-radius: 5px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .btn-move {
            background: var(--info);
            color: white;
        }

        .btn-delete {
            background: var(--danger);
            color: white;
        }

        .btn-image {
            background: var(--success);
            color: white;
        }

        .card-action-btn:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        .move-menu {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 8px;
            z-index: 10;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .move-menu.show {
            display: block;
        }

        .move-menu button {
            display: block;
            width: 100%;
            padding: 8px 16px;
            border: none;
            background: none;
            color: var(--text-primary);
            cursor: pointer;
            border-radius: 4px;
            text-align: left;
        }

        .move-menu button:hover {
            background: var(--glass);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border-radius: 20px;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            padding: 25px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .modal-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.4);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 25px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .info-section {
            background: var(--glass);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .info-section-title {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .info-value {
            color: var(--text-primary);
            font-weight: 500;
            text-align: right;
            max-width: 60%;
        }

        .status-selector {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .status-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            background: var(--glass);
            color: var(--text-primary);
        }

        .status-btn:hover {
            transform: translateY(-2px);
        }

        .status-btn.active-nao-testado {
            border-color: var(--danger);
            background: rgba(231, 76, 60, 0.15);
        }

        .status-btn.active-em-teste {
            border-color: var(--warning);
            background: rgba(243, 156, 18, 0.15);
        }

        .status-btn.active-testado {
            border-color: var(--success);
            background: rgba(46, 204, 113, 0.15);
        }

        /* Image upload in modal */
        .image-upload-section {
            margin-top: 20px;
            padding: 20px;
            background: var(--glass);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .image-upload-section h3 {
            color: var(--accent);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .image-upload-area {
            border: 2px dashed var(--accent);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .image-upload-area:hover {
            background: rgba(233, 69, 96, 0.1);
        }

        .image-upload-area svg {
            width: 30px;
            height: 30px;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .image-upload-area p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .image-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .image-preview-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
        }

        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview-item .remove-img {
            position: absolute;
            top: 4px;
            right: 4px;
            background: var(--danger);
            color: white;
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .upload-fab {
            position: fixed;
            right: 24px;
            bottom: 24px;
            width: 64px;
            height: 64px;
            border: none;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(81, 184, 234, 1) 0%, rgba(0, 0, 0, 1) 100%);
            color: #fff;
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
            z-index: 30;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        .upload-fab:hover {
            transform: translateY(-2px) scale(1.04);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.45);
            filter: brightness(1.08);
        }

        .upload-fab:active {
            transform: translateY(0) scale(0.98);
        }

        .upload-fab:focus-visible {
            outline: 3px solid rgba(255, 255, 255, 0.7);
            outline-offset: 4px;
        }

        .hidden-file-input {
            display: none;
        }

        .sub-section:empty::before {
            content: "Arraste cards para aqui";
            display: block;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            padding: 20px;
            font-style: italic;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .topbar {
                flex-direction: column;
                align-items: flex-start;
                padding: 14px;
            }
            .brand-name {
                position: static;
                transform: none;
                font-size: 1.5rem;
                margin-top: 4px;
            }
            .brand-logo {
                height: 36px;
            }
            .topbar-right {
                width: 100%;
                justify-content: space-between;
                margin-left: 0;
            }
            .clock .t {
                font-size: 1.15rem;
            }
            .zones-container {
                grid-template-columns: 1fr;
            }
            .modal {
                max-height: 95vh;
            }
            .card {
                flex-direction: column;
                align-items: stretch;
            }
            .card-thumbnail, .card-thumbnail-placeholder {
                width: 100%;
                height: 180px;
            }
            .upload-fab {
                right: 16px;
                bottom: 16px;
                width: 58px;
                height: 58px;
                font-size: 1.8rem;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <!-- Logótipo Somengil (imagem) -->
            <img src="https://res.cloudinary.com/dlkkjtgvy/image/upload/v1780388780/somengil_logo_white_ofh0xi.png" alt="Somengil" class="brand-logo">
        </div>
        
        <div class="brand-name">WashLAB</div>
        <div class="topbar-right">
            <!--<div class="live"><span class="dot"></span> </div>-->
            <div class="clock">
                <div class="t mono" id="clockTime">09:45</div>
                <div class="d" id="clockDate">Quinta · 18 Jun 2026</div>
            </div>
        </div>
    </header>

    <button class="upload-fab" id="uploadFab" type="button" aria-label="Fazer upload do ficheiro Excel" title="Carregar Excel">+</button>
    <input type="file" id="fileInput" class="hidden-file-input" accept=".xlsx,.xls,.csv">

    <!--<div class="controls">
        <button onclick="exportData()">💾 Exportar Dados</button>
        <button onclick="clearAll()">🗑️ Limpar Tudo</button>
        <button onclick="addDemoData()">🧪 Dados de Demo</button>
    </div>-->

    <div class="zones-container" id="zonesContainer">
        <!-- Zones will be generated by JS -->
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Detalhes do Cliente</div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content generated by JS -->
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        // ===================== DATA STRUCTURE =====================
        const ZONES = ['A', 'B', 'C', 'D'];
        const DEFAULT_SUB_SECTIONS = ['1'];
        const STATUSES = {
            'nao-testado': { label: 'Não Testado', class: 'status-nao-testado' },
            'em-teste': { label: 'Em Teste', class: 'status-em-teste' },
            'testado': { label: 'Já Testado / Live Demo', class: 'status-testado' }
        };

        // Default data structure
        let zoneSubSections = createEmptyZoneSubSections();
        let dashboardData = createEmptyDashboard(zoneSubSections);

        let currentCardId = null;

        // ===================== INITIALIZATION =====================
        document.addEventListener('DOMContentLoaded', () => {
            loadFromStorage();
            normalizeDashboardData();
            renderDashboard();
            setupUpload();
            updateClock();
            setInterval(updateClock, 1000);
        });

        function createEmptyZoneSubSections(sectionList = DEFAULT_SUB_SECTIONS) {
            return ZONES.reduce((acc, zone) => {
                acc[zone] = [...sectionList];
                return acc;
            }, {});
        }

        function getZoneSubSections(zone) {
            return zoneSubSections[zone] || DEFAULT_SUB_SECTIONS;
        }

        function getNextZoneSectionNumber(zone) {
            const numericSections = getZoneSubSections(zone)
                .map(section => parseInt(section, 10))
                .filter(Number.isFinite);
            const nextNumber = numericSections.length ? Math.max(...numericSections) + 1 : 1;
            return String(nextNumber);
        }

        function resolveZoneSectionChoice(choice, zoneSections) {
            const rawChoice = String(choice || '').trim();
            if (!rawChoice) return zoneSections[0];

            if (zoneSections.includes(rawChoice)) {
                return rawChoice;
            }

            const numericMatch = rawChoice.match(/(\d+)/);
            if (numericMatch) {
                const numericChoice = numericMatch[1];
                if (zoneSections.includes(numericChoice)) {
                    return numericChoice;
                }
            }

            const legacyMatch = rawChoice.match(/^Sec(?:ç|c)ão\s*(\d+)$/i);
            if (legacyMatch && zoneSections.includes(legacyMatch[1])) {
                return legacyMatch[1];
            }

            return zoneSections[0];
        }

        function createEmptyDashboard(sectionMap = zoneSubSections) {
            return ZONES.reduce((acc, zone) => {
                const sections = sectionMap[zone] || DEFAULT_SUB_SECTIONS;
                acc[zone] = sections.reduce((sectionAcc, sectionName) => {
                    sectionAcc[sectionName] = [];
                    return sectionAcc;
                }, {});
                return acc;
            }, {});
        }

        function normalizeZoneSubSections() {
            const normalized = createEmptyZoneSubSections();

            ZONES.forEach(zone => {
                const sections = Array.isArray(zoneSubSections[zone]) && zoneSubSections[zone].length
                    ? zoneSubSections[zone]
                    : DEFAULT_SUB_SECTIONS;
                normalized[zone] = sections.map(section => {
                    const match = String(section).match(/^Secção\s*(\d+)$/i);
                    return match ? match[1] : String(section);
                });
            });

            zoneSubSections = normalized;
        }

        function normalizeDashboardData() {
            normalizeZoneSubSections();
            const normalized = createEmptyDashboard(zoneSubSections);

            ZONES.forEach(zone => {
                const zoneData = dashboardData[zone] || {};
                Object.entries(zoneData).forEach(([rawSub, cards]) => {
                    const match = String(rawSub).match(/^Secção\s*(\d+)$/i);
                    const sub = match ? match[1] : String(rawSub);
                    if (!normalized[zone][sub]) {
                        normalized[zone][sub] = [];
                    }
                    if (Array.isArray(cards)) {
                        normalized[zone][sub].push(...cards);
                    }
                });
            });

            dashboardData = normalized;
        }

        function updateClock() {
            const timeEl = document.getElementById('clockTime');
            const dateEl = document.getElementById('clockDate');
            if (!timeEl || !dateEl) return;

            const now = new Date();
            const weekdays = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
            const months = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];

            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');

            timeEl.textContent = `${hours}:${minutes}`;
            dateEl.textContent = `${weekdays[now.getDay()]} · ${day} ${months[now.getMonth()]} ${now.getFullYear()}`;
        }

        // ===================== DATE CONVERSION =====================
        // Convert Excel serial date to readable date string
        function excelDateToString(serial) {
            if (!serial) return '';
            // Check if it's a number (Excel serial date)
            const num = parseFloat(serial);
            if (isNaN(num)) return serial; // Return as-is if not a number

            // Excel epoch starts at 1899-12-30
            const excelEpoch = new Date(1899, 11, 30);
            const date = new Date(excelEpoch.getTime() + num * 24 * 60 * 60 * 1000);

            // Check if date is valid
            if (isNaN(date.getTime())) return serial;

            // Format as DD/MM/YYYY
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

            if (!str) return '-';

        // ===================== IMAGE UPLOAD =====================
        function triggerImageUpload(cardId) {
            event.stopPropagation();
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const card = findCard(cardId);
                        if (card) {
                            card.thumbnail = ev.target.result;
                            if (!card.images) card.images = [];
                            card.images.push(ev.target.result);
                            saveToStorage();
                            renderDashboard();
                        }
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
            };
            input.click();
        }

                    card.thumbnail = card.images[0];
                } else {

        function triggerModalImageUpload() {
            const input = document.createElement('input');

            input.multiple = true;
            input.onchange = (e) => {
                if (e.target.files) {
                    Array.from(e.target.files).forEach(file => {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const card = findCard(currentCardId);
                            if (card) {
                                if (!card.images) card.images = [];
                                card.images.push(ev.target.result);
                                if (!card.thumbnail) {
                                    card.thumbnail = ev.target.result;
                                }
                                saveToStorage();
                                renderDashboard();
                                openCard(currentCardId);
                            }
                        };
                        reader.readAsDataURL(file);
                    });
                }

            input.click();

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            currentCardId = null;
        }

        function changeStatus(newStatus) {
            if (!currentCardId) return;
            const card = findCard(currentCardId);
            if (card) {
                card.status = newStatus;
                saveToStorage();
                renderDashboard();
                openCard(currentCardId);
            }
        }

        function findCard(id) {
            for (const zone of ZONES) {
                for (const sub of getZoneSubSections(zone)) {
                    const card = dashboardData[zone][sub].find(c => c.id === id);
                    if (card) return card;
                }
            }
            return null;
        }

        function deleteCard(id) {
            if (!confirm('Tem a certeza que deseja eliminar este card?')) return;

            for (const zone of ZONES) {
                for (const sub of getZoneSubSections(zone)) {
                    const idx = dashboardData[zone][sub].findIndex(c => c.id === id);
                    if (idx !== -1) {
                        dashboardData[zone][sub].splice(idx, 1);
                        saveToStorage();
                        renderDashboard();
                        return;
                    }
                }
            }
        }

        function showMoveMenu(id, btn) {
            event.stopPropagation();
            const menu = document.getElementById(`move-menu-${id}`);
            document.querySelectorAll('.move-menu').forEach(m => m.classList.remove('show'));
            menu.classList.toggle('show');
        }

        function moveCard(id, newZone) {
            event.stopPropagation();
            const card = findCard(id);
            if (!card) return;

            for (const zone of ZONES) {
                for (const sub of getZoneSubSections(zone)) {
                    const idx = dashboardData[zone][sub].findIndex(c => c.id === id);
                    if (idx !== -1) {
                        dashboardData[zone][sub].splice(idx, 1);
                    }
                }
            }

            card.zone = newZone;
            const targetSubSection = getZoneSubSections(newZone)[0] || DEFAULT_SUB_SECTIONS[0];
            if (!dashboardData[newZone][targetSubSection]) {
                dashboardData[newZone][targetSubSection] = [];
            }
            dashboardData[newZone][targetSubSection].push(card);

            saveToStorage();
            renderDashboard();
        }

        function addSubSectionToZone(zone) {
            const trimmedName = getNextZoneSectionNumber(zone);

            if (getZoneSubSections(zone).includes(trimmedName)) {
                alert('Já existe uma secção com esse nome.');
                return;
            }

            zoneSubSections[zone] = [...getZoneSubSections(zone), trimmedName];
            dashboardData[zone][trimmedName] = [];

            saveToStorage();
            renderDashboard();
        }

        function deleteSubSection(zone, subSectionName) {
            if (getZoneSubSections(zone).length === 1) {
                alert('Tem de existir pelo menos uma secção.');
                return;
            }

            const totalCards = ((dashboardData[zone] || {})[subSectionName] || []).length;

            const confirmMessage = totalCards > 0
                ? `Tem a certeza que deseja apagar a secção "${subSectionName}" da Zona ${zone}?\n\nIsto também irá remover ${totalCards} card(s) associados.`
                : `Tem a certeza que deseja apagar a secção "${subSectionName}"?`;

            if (!confirm(confirmMessage)) return;

            zoneSubSections[zone] = getZoneSubSections(zone).filter(sub => sub !== subSectionName);
            delete dashboardData[zone][subSectionName];

            saveToStorage();
            renderDashboard();
        }

        // ===================== EXCEL PARSING =====================
        function setupUpload() {
            const uploadFab = document.getElementById('uploadFab');
            const fileInput = document.getElementById('fileInput');

            uploadFab.addEventListener('click', () => {
                fileInput.value = '';
                fileInput.click();
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length) {
                    const selectedFile = e.target.files[0];
                    e.target.value = '';
                    handleFile(selectedFile);
                }
            });
        }

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];

                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });

                    console.log('=== RAW EXCEL DATA ===');
                    console.log(jsonData);

                    const getCell = (rowIdx) => {
                        if (rowIdx < jsonData.length && jsonData[rowIdx].length > 1) {
                            const val = jsonData[rowIdx][1];
                            return val !== undefined && val !== null ? String(val).trim() : '';
                        }
                        return '';
                    };

                    // ALL cell mappings as specified by user:
                    // B4  (index 3):  Nome Comercial Responsável
                    // B6  (index 5):  Nome Cliente/Revendedor
                    // B7  (index 6):  Morada
                    // B8  (index 7):  Nº. VAT
                    // B10 (index 9):  Procedimento (Live Demo / Testes Internos / Estudo)
                    // B11 (index 10): Idioma
                    // B13 (index 12): Utensílio(s)
                    // B14 (index 13): Quantidade Utensílios
                    // B15 (index 14): Trolley(s)
                    // B16 (index 15): Quantidade Trolleys
                    // B18 (index 17): Tipo de Sujidade
                    // B20 (index 19): Limpeza | Secagem
                    // B21 (index 20): Outro
                    // B24 (index 23): Observações
                    // B25 (index 24): Temperatura Máxima
                    // B27 (index 26): Data de Registo (DATE)
                    // B28 (index 27): Previsão de Conclusão (DATE)

                    const parsedData = {
                        comercial: getCell(3),           // B4
                        clienteNome: getCell(5),          // B6
                        morada: getCell(6),               // B7
                        vat: getCell(7),                  // B8
                        procedimento: getCell(9),         // B10
                        idioma: getCell(10),              // B11
                        utensilios: getCell(12),          // B13
                        qtdUtensilios: getCell(13),       // B14
                        trolleys: getCell(14),            // B15
                        qtdTrolleys: getCell(15),         // B16
                        sujidade: getCell(17),            // B18
                        limpezaSecagem: getCell(19),      // B20
                        outro: getCell(20),               // B21
                        observacoes: getCell(23),         // B24
                        tempMax: getCell(24),             // B25
                        dataRegisto: excelDateToString(getCell(26)),         // B27 - converted to date
                        previsaoConclusao: excelDateToString(getCell(27))    // B28 - converted to date
                    };

                    console.log('=== PARSED DATA ===');
                    console.log(parsedData);

                    const zone = prompt('Escolha a Zona (A, B, C, D):', 'A')?.toUpperCase() || 'A';
                    const validZone = ZONES.includes(zone) ? zone : 'A';

                    const zoneSections = getZoneSubSections(validZone);
                    const subPrompt = `Escolha a Secção para a Zona ${validZone}:\n${zoneSections.map((sub) => `${sub}. ${sub}`).join('\n')}`;
                    const subChoice = prompt(subPrompt, '1') || '1';
                    const subSection = resolveZoneSectionChoice(subChoice, zoneSections);

                    const newCard = {
                        id: 'card_' + Date.now(),
                        zone: validZone,
                        status: 'nao-testado',
                        data: parsedData,
                        thumbnail: null,
                        images: [],
                        createdAt: new Date().toISOString()
                    };

                    if (!dashboardData[validZone][subSection]) {
                        dashboardData[validZone][subSection] = [];
                    }
                    dashboardData[validZone][subSection].push(newCard);
                    saveToStorage();
                    renderDashboard();

                    alert(`Card criado com sucesso na Zona ${validZone}, ${subSection}!\n\nCliente: ${parsedData.clienteNome || 'N/A'}\nComercial: ${parsedData.comercial || 'N/A'}\nRegisto: ${parsedData.dataRegisto || 'N/A'}\nConclusão: ${parsedData.previsaoConclusao || 'N/A'}`);

                } catch (err) {
                    console.error('Error parsing file:', err);
                    alert('Erro ao processar o ficheiro. Verifique o formato.\nDetalhe: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

            dashboardData['C'][getZoneSubSections('C')[0] || DEFAULT_SUB_SECTIONS[0]].push({
                id: 'demo3_' + Date.now(),
                zone: 'C',
                status: 'nao-testado',
                data: demoData3,
                thumbnail: null,
                images: [],
                createdAt: new Date().toISOString()
            });

            saveToStorage();
            renderDashboard();
        }

        // ===================== STORAGE =====================
        function saveToStorage() {
            localStorage.setItem('dashboardData', JSON.stringify({
                dashboardData,
                zoneSubSections
            }));
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('dashboardData');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed && parsed.dashboardData && parsed.zoneSubSections) {
                        dashboardData = parsed.dashboardData;
                        zoneSubSections = parsed.zoneSubSections;
                    } else {
                        dashboardData = parsed;
                    }
                } catch (e) {
                    console.error('Error loading from storage:', e);
                }
            }
        }

        function clearAll() {
            if (!confirm('Tem a certeza que deseja limpar todos os dados?')) return;
            zoneSubSections = createEmptyZoneSubSections();
            dashboardData = createEmptyDashboard(zoneSubSections);
            saveToStorage();
            renderDashboard();
        }

        function exportData() {
            const dataStr = JSON.stringify(dashboardData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'dashboard_data.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Close modal on overlay click
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) {
                closeModal();
            }
        });

        // Close move menus when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.card-actions')) {
                document.querySelectorAll('.move-menu').forEach(m => m.classList.remove('show'));
            }
        });
    </script>
</body>
</html>
