<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Identificação de Material do Cliente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --bg-card-hover: #1e2a4a;
            --accent: #2cb0e4;
            --accent-light: #ff6b6b;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --success: #2ecc71;
            --warning: #f39c12;
            --info: #3498db;
            --danger: #e74c3c;
            --glass: rgba(255,255,255,0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, rgba(81, 184, 234, 1) 0%, rgba(0, 0, 0, 1) 100%);
            /*background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);*/
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
        }

        .topbar {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 30px;
            background: radial-gradient(circle at center, rgb(0, 61, 110) 0%, rgb(2, 80, 104) 100%);
            border-radius: 12px;
            padding: 14px 18px;
            /*border: 1px solid rgba(255, 255, 255, 0.12);*/
        }

        .brand {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .brand-name {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            color: var(--text-primary);
            text-transform: uppercase;
            white-space: nowrap;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
        }

        .brand-logo {
            height: 42px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-left: auto;
        }

        .live {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.38);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4dff5c;
            box-shadow: 0 0 0 6px rgba(255, 77, 90, 0.25);
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 77, 90, 0.4);
            }
            50% {
                transform: scale(1.15);
                box-shadow: 0 0 0 8px rgba(255, 77, 90, 0);
            }
        }

        .clock {
            text-align: right;
            line-height: 1.1;
        }

        .mono {
            font-family: Consolas, "Courier New", monospace;
        }

        .clock .t {
            font-size: 1.35rem;
            font-weight: 700;
        }

        .clock .d {
            margin-top: 4px;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .controls button, .controls select {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .controls button {
            background: var(--accent);
            color: white;
            font-weight: 600;
        }

        .controls button:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(69, 187, 233, 0.4);
        }

        .controls select {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--accent);
        }

        .zones-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .zone {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .zone-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent);
        }

        .zone-header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .zone-title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .zone-title-label {
            color: white;
        }

        .zone-count {
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .zone-add-btn {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .zone-add-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .sub-sections {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .sub-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .sub-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .sub-section-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none;
        }

        .sub-section-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .sub-section-action-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .sub-section-action-btn:hover {
            background: rgba(255, 255, 255, 0.16);
            transform: translateY(-1px);
        }

        .sub-section-action-btn.delete {
            color: #ff7a7a;
        }

        .sub-section-action-btn.delete:hover {
            background: rgba(231, 76, 60, 0.18);
        }

        .sub-section-cards {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            background: linear-gradient(145deg, #1e2a4a, #16213e);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid var(--accent);
            position: relative;
            overflow: hidden;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .card-corner-delete {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 8px;
            background: rgba(231, 77, 60, 0);
            color: #ff9a9a;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
            transition: all 0.2s ease;
        }

        .card-corner-delete:hover {
            background: rgba(231, 76, 60, 0.35);
            transform: translateY(-1px);
        }

        .card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .card.status-nao-testado { border-left-color: var(--danger); }
        .card.status-em-teste { border-left-color: var(--warning); }
        .card.status-testado { border-left-color: var(--success); }

        .card-thumbnail {
            width: 180px;
            height: 180px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.1);
            background: var(--bg-dark);
        }

        .card-thumbnail-placeholder {
            width: 180px;
            height: 180px;
            border-radius: 8px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #2a3a5a, #1e2a4a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border: 2px dashed rgba(255,255,255,0.15);
            color: var(--text-secondary);
        }

        .card-body {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            min-height: 180px;
            position: relative;
        }

        .card-header-mini {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .card-cliente {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-status-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .status-nao-testado .card-status-badge { background: rgba(231, 76, 60, 0.2); color: var(--danger); }
        .status-em-teste .card-status-badge { background: rgba(243, 156, 18, 0.2); color: var(--warning); }
        .status-testado .card-status-badge { background: rgba(46, 204, 113, 0.2); color: var(--success); }

        .card-info-mini {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.8rem;
        }

        .card-info-column {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .card-info-column-right {
            align-items: flex-start;
        }

        .card-info-column-right .card-info-item {
            align-items: flex-start;
            text-align: left;
        }

        .card-info-item {
            display: flex;
            flex-direction: column;
        }

        .card-info-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .card-info-value {
            color: var(--text-primary);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-info-item.flag-item .card-info-label {
            display: none;
        }

        .card-info-item.flag-item .card-info-value {
            white-space: normal;
            overflow: visible;
            text-overflow: clip;
            margin-top: 2px;
        }

        .card-info-flag {
            display: block;
            width: 84px;
            height: 58px;
            border-radius: 6px;
            object-fit: cover;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.2), 0 6px 14px rgba(0,0,0,0.3);
        }

        .country-inline {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            max-width: 100%;
        }

        .country-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-actions {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }

        .card-footer {
            margin-top: auto;
            padding-top: 10px;
        }

        .card-action-btn {
            flex: 1;
            padding: 5px;
            border: none;
            border-radius: 5px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .btn-move {
            background: var(--info);
            color: white;
        }

        .btn-delete {
            background: var(--danger);
            color: white;
        }

        .btn-image {
            background: var(--success);
            color: white;
        }

        .card-action-btn:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        .move-menu {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 8px;
            z-index: 10;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .move-menu.show {
            display: block;
        }

        .move-menu button {
            display: block;
            width: 100%;
            padding: 8px 16px;
            border: none;
            background: none;
            color: var(--text-primary);
            cursor: pointer;
            border-radius: 4px;
            text-align: left;
        }

        .move-menu button:hover {
            background: var(--glass);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border-radius: 20px;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            padding: 25px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .modal-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.4);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 25px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .info-section {
            background: var(--glass);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .info-section-title {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .info-value {
            color: var(--text-primary);
            font-weight: 500;
            text-align: right;
            max-width: 60%;
        }

        .status-selector {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .status-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            background: var(--glass);
            color: var(--text-primary);
        }

        .status-btn:hover {
            transform: translateY(-2px);
        }

        .status-btn.active-nao-testado {
            border-color: var(--danger);
            background: rgba(231, 76, 60, 0.15);
        }

        .status-btn.active-em-teste {
            border-color: var(--warning);
            background: rgba(243, 156, 18, 0.15);
        }

        .status-btn.active-testado {
            border-color: var(--success);
            background: rgba(46, 204, 113, 0.15);
        }

        /* Image upload in modal */
        .image-upload-section {
            margin-top: 20px;
            padding: 20px;
            background: var(--glass);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .qr-section {
            margin-top: 20px;
            padding: 20px;
            background: var(--glass);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .qr-section h3 {
            color: var(--accent);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            text-align: center;
        }

        .qr-preview {
            width: 220px;
            max-width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.25);
            background: #ffffff;
            padding: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .qr-preview img {
            display: block;
            width: 100%;
            height: auto;
        }

        .qr-helper {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-align: center;
        }

        .qr-download-btn {
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg, #16a085, #2ecc71);
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .qr-download-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.06);
        }

        .image-upload-section h3 {
            color: var(--accent);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .image-upload-area {
            border: 2px dashed var(--accent);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .image-upload-area:hover {
            background: rgba(233, 69, 96, 0.1);
        }

        .image-upload-area svg {
            width: 30px;
            height: 30px;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .image-upload-area p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .image-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .image-preview-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
        }

        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview-item .remove-img {
            position: absolute;
            top: 4px;
            right: 4px;
            background: var(--danger);
            color: white;
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .upload-fab {
            position: fixed;
            right: 24px;
            bottom: 24px;
            width: 64px;
            height: 64px;
            border: none;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(81, 184, 234, 1) 0%, rgba(0, 0, 0, 1) 100%);
            color: #fff;
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
            z-index: 30;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        .upload-fab:hover {
            transform: translateY(-2px) scale(1.04);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.45);
            filter: brightness(1.08);
        }

        .upload-fab:active {
            transform: translateY(0) scale(0.98);
        }

        .upload-fab:focus-visible {
            outline: 3px solid rgba(255, 255, 255, 0.7);
            outline-offset: 4px;
        }

        .hidden-file-input {
            display: none;
        }

        .sub-section:empty::before {
            content: "Arraste cards para aqui";
            display: block;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            padding: 20px;
            font-style: italic;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .topbar {
                flex-direction: column;
                align-items: flex-start;
                padding: 14px;
            }
            .brand-name {
                position: static;
                transform: none;
                font-size: 1.5rem;
                margin-top: 4px;
            }
            .brand-logo {
                height: 36px;
            }
            .topbar-right {
                width: 100%;
                justify-content: space-between;
                margin-left: 0;
            }
            .clock .t {
                font-size: 1.15rem;
            }
            .zones-container {
                grid-template-columns: 1fr;
            }
            .modal {
                max-height: 95vh;
            }
            .card {
                flex-direction: column;
                align-items: stretch;
            }

    <script>
        // ===================== DATA STRUCTURE =====================

        // ===================== INITIALIZATION =====================
        document.addEventListener('DOMContentLoaded', () => {
            if (renderQrInfoFromUrlIfPresent()) {

        function createEmptyZoneSubSections(sectionList = DEFAULT_SUB_SECTIONS) {
            return ZONES.reduce((acc, zone) => {
                acc[zone] = [...sectionList];
                return acc;
            }, {});
        }

        function getZoneSubSections(zone) {
            return zoneSubSections[zone] || DEFAULT_SUB_SECTIONS;
        }

        function getNextZoneSectionNumber(zone) {
            const numericSections = getZoneSubSections(zone)
                .map(section => parseInt(section, 10))
                .filter(Number.isFinite);
            const nextNumber = numericSections.length ? Math.max(...numericSections) + 1 : 1;
            return String(nextNumber);
        }

        function resolveZoneSectionChoice(choice, zoneSections) {
            const rawChoice = String(choice || '').trim();
            if (!rawChoice) return zoneSections[0];

            if (zoneSections.includes(rawChoice)) {
                return rawChoice;
            }

            const numericMatch = rawChoice.match(/(\d+)/);
            if (numericMatch) {
                const numericChoice = numericMatch[1];
                if (zoneSections.includes(numericChoice)) {
                    return numericChoice;
                }
            }

            const legacyMatch = rawChoice.match(/^Sec(?:ç|c)ão\s*(\d+)$/i);
            if (legacyMatch && zoneSections.includes(legacyMatch[1])) {
                return legacyMatch[1];
            }

            return zoneSections[0];
        }

        function createEmptyDashboard(sectionMap = zoneSubSections) {
            return ZONES.reduce((acc, zone) => {
                const sections = sectionMap[zone] || DEFAULT_SUB_SECTIONS;
                acc[zone] = sections.reduce((sectionAcc, sectionName) => {
                    sectionAcc[sectionName] = [];
                    return sectionAcc;
                }, {});
                return acc;
            }, {});
        }

        function normalizeZoneSubSections() {
            const normalized = createEmptyZoneSubSections();

            ZONES.forEach(zone => {
                const sections = Array.isArray(zoneSubSections[zone]) && zoneSubSections[zone].length
                    ? zoneSubSections[zone]
                    : DEFAULT_SUB_SECTIONS;
                normalized[zone] = sections.map(section => {
                    const match = String(section).match(/^Secção\s*(\d+)$/i);
                    return match ? match[1] : String(section);
                });
            });

            zoneSubSections = normalized;
        }

        function normalizeDashboardData() {
            normalizeZoneSubSections();
            const normalized = createEmptyDashboard(zoneSubSections);

            ZONES.forEach(zone => {
                const zoneData = dashboardData[zone] || {};
                Object.entries(zoneData).forEach(([rawSub, cards]) => {
                    const match = String(rawSub).match(/^Secção\s*(\d+)$/i);
                    const sub = match ? match[1] : String(rawSub);
                    if (!normalized[zone][sub]) {
                        normalized[zone][sub] = [];
                    }
                    if (Array.isArray(cards)) {
                        normalized[zone][sub].push(...cards.map(card => ({
                            ...card,
                            data: card && card.data
                                ? {

                                    pais: card.data.pais || card.data.morada || ''

            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');

            timeEl.textContent = `${hours}:${minutes}`;
            dateEl.textContent = `${weekdays[now.getDay()]} · ${day} ${months[now.getMonth()]} ${now.getFullYear()}`;
        }

        // ===================== DATE CONVERSION =====================

        function excelDateToString(serial) {
            if (!serial) return '';
            // Check if it's a number (Excel serial date)
            const num = parseFloat(serial);
            if (isNaN(num)) return serial; // Return as-is if not a number

            // Excel epoch starts at 1899-12-30
            const excelEpoch = new Date(1899, 11, 30);
            const date = new Date(excelEpoch.getTime() + num * 24 * 60 * 60 * 1000);

            // Check if date is valid
            if (isNaN(date.getTime())) return serial;

            // Format as DD/MM/YYYY
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatCountryWithFlag(country) {
            const value = String(country || '').trim();
            if (!value) return '-';

            const safeValue = escapeHtml(value);
            return `<span class="country-inline"><span class="country-name">${safeValue}</span></span>`;
        }

        function renderInfoFlag(country) {
            const value = String(country || '').trim();
            if (!value) return '';

            const code = getCountryCode(value);
            if (!code) return '';

            const safeValue = escapeHtml(value);
            return `<img src="https://flagcdn.com/w80/${code.toLowerCase()}.png" alt="${safeValue}" class="card-info-flag" title="${safeValue}">`;
        }

        function getCountryFlagUrl(country) {
            const value = String(country || '').trim();
            if (!value) return '';

            const code = getCountryCode(value);
            if (!code) return '';

            return `https://flagcdn.com/w160/${code.toLowerCase()}.png`;
        }

        function sanitizeQrValue(value) {
            return String(value || '-')
                .replace(/\s+/g, ' ')
                .replace(/[|]/g, '/')
                .trim();
        }

        function encodeBase64Utf8(value) {
            try {
                const bytes = new TextEncoder().encode(String(value || ''));
                let binary = '';
                bytes.forEach(byte => {
                    binary += String.fromCharCode(byte);
                });
                return btoa(binary);
            } catch (err) {
                return '';
            }
        }

        function decodeBase64Utf8(value) {
            try {
                const binary = atob(String(value || ''));
                const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
                return new TextDecoder().decode(bytes);
            } catch (err) {
                return '';
            }
        }

        function buildCardQrObject(card) {
            const data = card.data || {};
            const statusInfo = STATUSES[card.status] || STATUSES['nao-testado'];

            return {
                app: 'washlab',
                id: sanitizeQrValue(card.id),
                zona: sanitizeQrValue(card.zone),
                cliente: sanitizeQrValue(data.clienteNome),
                comercial: sanitizeQrValue(data.comercial),
                pais: sanitizeQrValue(data.pais || data.morada),
                procedimento: sanitizeQrValue(data.procedimento),
                vat: sanitizeQrValue(data.vat),
                registo: sanitizeQrValue(data.dataRegisto),
                conclusao: sanitizeQrValue(data.previsaoConclusao)
            };
        }

        function buildCardQrFallbackText(card) {
            const payload = buildCardQrObject(card);
            return [
                'WashLAB Card',
                `ID: ${payload.id}`,
                `Zona: ${payload.zona}`,
                `Cliente: ${payload.cliente}`,
                `Comercial: ${payload.comercial}`,
                `Pais: ${payload.pais}`,
                `Procedimento: ${payload.procedimento}`,
                `VAT: ${payload.vat}`,
                `Registo: ${payload.registo}`,
                `Conclusao: ${payload.conclusao}`
            ].join('\n');
        }

        function buildCardQrPayload(card) {
            // If app is served over HTTP(S), QR points to this page with encoded payload,
            // allowing scanners to open a readable card view directly.
            if (location.protocol === 'http:' || location.protocol === 'https:') {
                const json = JSON.stringify(buildCardQrObject(card));
                const encoded = encodeBase64Utf8(json);
                if (encoded) {
                    return `${location.origin}${location.pathname}?qr=${encodeURIComponent(encoded)}`;
                }
            }

            // Fallback for file:// usage where phones cannot access local URLs.
            return buildCardQrFallbackText(card);
        }

        function renderQrInfoFromUrlIfPresent() {
            const params = new URLSearchParams(window.location.search);
            const qrParam = params.get('qr');
            if (!qrParam) return false;

            const decodedJson = decodeBase64Utf8(qrParam);
            if (!decodedJson) return false;

            let payload;
            try {
                payload = JSON.parse(decodedJson);
            } catch (err) {
                return false;
            }

            if (!payload || payload.app !== 'washlab') return false;

            const details = [
                { label: 'ID', value: payload.id },
                { label: 'Zona', value: payload.zona },
                { label: 'Cliente', value: payload.cliente },
                { label: 'Comercial', value: payload.comercial },
                { label: 'Pais', value: payload.pais },
                { label: 'Procedimento', value: payload.procedimento },
                { label: 'VAT', value: payload.vat },
                { label: 'Data de Registo', value: payload.registo },
                { label: 'Previsao de Conclusao', value: payload.conclusao }
            ];

            document.body.innerHTML = `
                <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(circle at center, rgba(81, 184, 234, 1) 0%, rgba(0, 0, 0, 1) 100%);font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;color:#eaeaea;">
                    <div style="width:100%;max-width:680px;background:#16213e;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;box-shadow:0 12px 30px rgba(0,0,0,0.35);">
                        <h1 style="margin:0 0 6px 0;font-size:1.4rem;">WashLAB · Info do Card</h1>
                        <p style="margin:0 0 18px 0;color:#a0a0a0;font-size:0.9rem;">Dados lidos via QR Code</p>
                        <div style="display:grid;grid-template-columns:1fr;gap:8px;">
                            ${details.map(item => `
                                <div style="display:flex;justify-content:space-between;gap:12px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,0.05);">
                                    <span style="color:#a0a0a0;font-size:0.85rem;">${escapeHtml(item.label)}</span>
                                    <span style="text-align:right;font-weight:600;">${escapeHtml(item.value || '-')}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            return true;
        }

        function generateCardQrDataUrl(card, size = 220) {
            if (!card || typeof QRious !== 'function') return '';

            try {
                const qr = new QRious({
                    value: buildCardQrPayload(card),
                    size,
                    level: 'L',
                    background: 'white',
                    foreground: 'black'
                });
                return qr.toDataURL();
            } catch (err) {
                console.error('Erro ao gerar QR code:', err);
                return '';
            }
        }

        function sanitizeFileName(value) {
            return String(value || 'sem_nome')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-zA-Z0-9_-]+/g, '_')
                .replace(/_+/g, '_')
                .replace(/^_+|_+$/g, '')
                .toLowerCase() || 'sem_nome';
        }

        function loadImageWithCors(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error('flag_load_failed'));
                img.src = url;
            });
        }

        async function generatePrintableQrDataUrl(card, qrSize = 700) {
            if (!card || typeof QRious !== 'function') return '';

            try {
                const qrCanvas = document.createElement('canvas');
                new QRious({
                    element: qrCanvas,
                    value: buildCardQrPayload(card),
                    size: qrSize,
                    level: 'L',
                    background: 'white',
                    foreground: 'black'
                });

                const padding = 44;
                const headerHeight = 128;
                const footerHeight = 112;
                const outCanvas = document.createElement('canvas');
                outCanvas.width = qrSize + padding * 2;
                outCanvas.height = qrSize + headerHeight + footerHeight + padding * 2;

                const ctx = outCanvas.getContext('2d');
                if (!ctx) return '';

                const clientName = String(card?.data?.clienteNome || 'Sem Nome').trim() || 'Sem Nome';

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, outCanvas.width, outCanvas.height);

                ctx.fillStyle = '#111111';
                ctx.textAlign = 'center';
                ctx.font = '700 36px Segoe UI, Arial, sans-serif';
                ctx.fillText('WashLAB - QR Code', outCanvas.width / 2, padding + 42);

                ctx.font = '600 30px Segoe UI, Arial, sans-serif';
                ctx.fillText(clientName, outCanvas.width / 2, padding + 88);

                const flagUrl = getCountryFlagUrl(card?.data?.pais || card?.data?.morada || '');
                if (flagUrl) {
                    try {
                        const flagImg = await loadImageWithCors(flagUrl);
                        const flagWidth = 108;
                        const flagHeight = 74;
                        const flagX = outCanvas.width - padding - flagWidth;
                        const flagY = padding + 8;

                        ctx.save();
                        ctx.shadowColor = 'rgba(0,0,0,0.2)';
                        ctx.shadowBlur = 8;
                        ctx.shadowOffsetY = 2;
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(flagX - 2, flagY - 2, flagWidth + 4, flagHeight + 4);
                        ctx.drawImage(flagImg, flagX, flagY, flagWidth, flagHeight);
                        ctx.restore();
                    } catch (err) {
                        // Keep QR export working even if flag loading fails.
                    }
                }

                ctx.strokeStyle = '#d9d9d9';
                ctx.lineWidth = 2;
                ctx.strokeRect(padding - 1, padding + headerHeight - 1, qrSize + 2, qrSize + 2);

                ctx.drawImage(qrCanvas, padding, padding + headerHeight, qrSize, qrSize);

                ctx.fillStyle = '#555555';
                ctx.textAlign = 'left';
                ctx.font = '500 20px Segoe UI, Arial, sans-serif';

                const footerStartY = padding + headerHeight + qrSize + 34;
                const safeId = String(card.id || '').trim() || '-';
                const safeDataRegisto = String(card?.data?.dataRegisto || '-').trim() || '-';
                const safePrevisao = String(card?.data?.previsaoConclusao || '-').trim() || '-';

                ctx.fillText(`ID: ${safeId}`, padding, footerStartY);
                ctx.fillText(`Data de Registo: ${safeDataRegisto}`, padding, footerStartY + 30);
                ctx.fillText(`Previsao de Conclusao: ${safePrevisao}`, padding, footerStartY + 60);

                return outCanvas.toDataURL('image/png');
            } catch (err) {
                console.error('Erro ao gerar QR para impressao:', err);
                return '';
            }
        }

        async function downloadCardQr(cardId) {
            const card = findCard(cardId);
            if (!card) return;

            const printableQrDataUrl = await generatePrintableQrDataUrl(card, 700);
            const qrDataUrl = printableQrDataUrl || generateCardQrDataUrl(card, 700);
            if (!qrDataUrl) {
                alert('Nao foi possivel gerar o QR code deste card.');
                return;
            }

            const clientFilePart = sanitizeFileName(card?.data?.clienteNome || 'sem_nome');

            const a = document.createElement('a');
            a.href = qrDataUrl;
            a.download = `qr_${clientFilePart}_${card.id}.png`;
            a.click();
        }

        function downloadCurrentCardQr() {
            if (!currentCardId) return;
            downloadCardQr(currentCardId);
        }

        // ===================== RENDER DASHBOARD =====================
        function renderDashboard() {
            const container = document.getElementById('zonesContainer');
            container.innerHTML = '';

            ZONES.forEach(zone => {
                const zoneEl = document.createElement('div');
                zoneEl.className = 'zone';

                zoneEl.innerHTML = `

                        <div class="zone-header-right">
                            <div class="zone-count">${totalCards} cards</div>
                            <button type="button" class="zone-add-btn" onclick="addSubSectionToZone('${zone}')" title="Adicionar secção">+</button>
                        </div>
                    </div>
                    <div class="sub-sections">
                        ${getZoneSubSections(zone).map((sub, idx) => {
                            const cards = dashboardData[zone][sub] || [];
                            return `
                                <div class="sub-section">
                                    <div class="sub-section-header">
                                        <div class="sub-section-title"></div>
                                        <div class="sub-section-actions">
                                            <button type="button" class="sub-section-action-btn delete" onclick="deleteSubSection('${zone}', '${sub}')" title="Apagar esta secção">🗑</button>
                                        </div>
                                    </div>
                                    <div class="sub-section-cards" data-zone="${zone}" data-sub="${sub}">
                                        ${cards.map(card => renderCard(card)).join('')}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;

                container.appendChild(zoneEl);
            });
        }

        function renderCard(card) {
            const statusInfo = STATUSES[card.status] || STATUSES['nao-testado'];
            const countryValue = card.data.pais || card.data.morada || '';
            const infoFlag = renderInfoFlag(countryValue);

            // Mini info em duas colunas: esquerda (Comercial, Cliente, País) e direita (Procedimento)
            const miniInfoLeft = [
                { label: 'Comercial', value: card.data.comercial || '-' },
                { label: 'Cliente', value: card.data.clienteNome || '-' },
                { label: 'País', value: formatCountryWithFlag(countryValue) }
            ];

            const miniInfoRight = [
                { label: 'Procedimento', value: card.data.procedimento || '-' },
                { label: '', value: infoFlag, isHtml: true, className: 'flag-item' }
            ];

            const thumbnailHtml = card.thumbnail 
                ? `<img src="${card.thumbnail}" class="card-thumbnail" alt="thumbnail">`
                : `<div class="card-thumbnail-placeholder">📷</div>`;

            return `
                <div class="card ${statusInfo.class}" data-id="${card.id}" onclick="openCard('${card.id}')">
                    <button type="button" class="card-corner-delete" onclick="event.stopPropagation(); deleteCard('${card.id}')" title="Eliminar card">🗑</button>
                    ${thumbnailHtml}
                    <div class="card-body">
                        <div class="card-header-mini">
                            <div class="card-cliente">${card.data.clienteNome || 'Sem Nome'}</div>
                            <div class="card-status-badge">${statusInfo.label}</div>
                        </div>
                        <div class="card-info-mini">
                            <div class="card-info-column">
                                ${miniInfoLeft.map(item => `
                                    <div class="card-info-item">
                                        <span class="card-info-label">${item.label}</span>
                                        <span class="card-info-value">${item.label === 'País' ? item.value : truncate(item.value, 18)}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="card-info-column card-info-column-right">
                                ${miniInfoRight.map(item => `
                                    <div class="card-info-item ${item.className || ''}">
                                        <span class="card-info-label">${item.label}</span>
                                        <span class="card-info-value">${item.isHtml ? (item.value || '') : truncate(item.value, 18)}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="card-footer">
                            <div class="card-actions" onclick="event.stopPropagation()">
                                <!--<button class="card-action-btn btn-image" onclick="triggerImageUpload('${card.id}')">📷 Imagem</button>
                                <button class="card-action-btn btn-move" onclick="showMoveMenu('${card.id}', this)">📦 Mover</button>-->
                                <div class="move-menu" id="move-menu-${card.id}">
                                    ${ZONES.map(z => `
                                        ${z !== card.zone ? `<button onclick="moveCard('${card.id}', '${z}')">Zona ${z}</button>` : ''}
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function truncate(str, max) {
            if (!str) return '-';
            return str.length > max ? str.substring(0, max) + '...' : str;
        }

        // ===================== IMAGE UPLOAD =====================
        function triggerImageUpload(cardId) {
            event.stopPropagation();
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const card = findCard(cardId);
                        if (card) {
                            card.thumbnail = ev.target.result;
                            if (!card.images) card.images = [];
                            card.images.push(ev.target.result);
                            saveToStorage();
                            renderDashboard();
                        }
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
            };
            input.click();
        }

        function removeImage(cardId, index) {
            const card = findCard(cardId);
            if (card) {
                if (Array.isArray(card.images)) {
                    card.images.splice(index, 1);
                }
                if (card.images && card.images.length > 0) {
                    card.thumbnail = card.images[0];
                } else {
                    card.thumbnail = null;
                }
                saveToStorage();
                renderDashboard();
                openCard(cardId);
            }
        }

        // ===================== CARD OPERATIONS =====================
        function openCard(id) {
            const card = findCard(id);
            if (!card) return;
            const countryValue = card.data.pais || card.data.morada || '';
            const qrDataUrl = generateCardQrDataUrl(card, 240);
            const qrClientName = escapeHtml(card.data.clienteNome || 'Sem Nome');
            const qrSectionTitle = `QR Code · ${qrClientName}`;

            currentCardId = id;
            const modal = document.getElementById('modalOverlay');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');

            title.textContent = card.data.clienteNome || 'Detalhes do Cliente';

            // Build images section
            const images = card.images || [];
            const imagesHtml = images.length > 0 
                ? images.map((img, idx) => `
                    <div class="image-preview-item">
                        <img src="${img}" alt="Imagem ${idx + 1}">
                        <button class="remove-img" onclick="removeImage('${card.id}', ${idx})">×</button>
                    </div>
                `).join('')
                : '<p style="color: var(--text-secondary); text-align: center; grid-column: 1/-1;">Nenhuma imagem carregada</p>';

            const qrHtml = qrDataUrl
                ? `
                    <div class="qr-preview">
                        <img src="${qrDataUrl}" alt="QR code do card">
                    </div>
                    <button class="qr-download-btn" onclick="downloadCurrentCardQr()">⬇ Descarregar QR</button>
                    <div class="qr-helper">Ao ler o QR, abre uma pagina com os dados essenciais do card.</div>
                `
                : '<div class="qr-helper">Nao foi possivel gerar o QR code para este card.</div>';

            const sections = [
                {
                    title: '1. Comercial Responsável',
                    rows: [
                        { label: 'Nome Comercial Responsável', value: card.data.comercial }
                    ]
                },
                {
                    title: '2. Dados do Cliente/Revendedor',
                    rows: [
                        { label: 'Nome Cliente/Revendedor', value: card.data.clienteNome },
                        { label: 'País', value: formatCountryWithFlag(countryValue) },
                        { label: 'Nº. VAT', value: card.data.vat }
                    ]
                },
                {
                    title: '3. Procedimento Pretendido',
                    rows: [
                        { label: 'Procedimento', value: card.data.procedimento },
                        { label: 'Idioma', value: card.data.idioma }
                    ]
                },
                {
                    title: '4. Especificidade do Utensílio e do Trolley',
                    rows: [
                        { label: 'Utensílio(s)', value: card.data.utensilios },
                        { label: 'Quantidade Utensílios', value: card.data.qtdUtensilios },
                        { label: 'Trolley(s)', value: card.data.trolleys },
                        { label: 'Quantidade Trolleys', value: card.data.qtdTrolleys }
                    ]
                },
                {
                    title: '5. Tipo de Sujidade',
                    rows: [
                        { label: 'Tipo de Sujidade', value: card.data.sujidade }
                    ]
                },
                {
                    title: '6. Principais Objetivos da Lavagem',
                    rows: [
                        { label: 'Limpeza / Secagem', value: card.data.limpezaSecagem },
                        { label: 'Outro', value: card.data.outro }
                    ]
                },
                {
                    title: '7. Observações / Imagens',
                    rows: [
                        { label: 'Observações', value: card.data.observacoes },
                        { label: 'Temperatura Máxima', value: card.data.tempMax }
                    ]
                },
                {
                    title: '8. Prazos',
                    rows: [
                        { label: 'Data de Registo', value: card.data.dataRegisto },
                        { label: 'Previsão de Conclusão', value: card.data.previsaoConclusao }
                    ]
                }
            ];

            body.innerHTML = `
                <div class="info-grid">
                    ${sections.map(section => `
                        <div class="info-section">
                            <div class="info-section-title">${section.title}</div>
                            ${section.rows.map(row => `
                                <div class="info-row">
                                    <span class="info-label">${row.label}</span>
                                    <span class="info-value">${row.value || '-'}</span>
                                </div>
                            `).join('')}
                        </div>
                    `).join('')}
                </div>

                <div class="qr-section">
                    <h3>${qrSectionTitle}</h3>
                    ${qrHtml}
                </div>

                <div class="image-upload-section">
                    <h3>📷 Imagens do Material</h3>
                    <div class="image-upload-area" onclick="triggerModalImageUpload()">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p>Clique para adicionar imagem</p>
                    </div>
                    <div class="image-preview-grid" id="modalImageGrid">
                        ${imagesHtml}
                    </div>
                </div>

                <div class="status-selector">
                    <button class="status-btn ${card.status === 'nao-testado' ? 'active-nao-testado' : ''}" onclick="changeStatus('nao-testado')">
                        🔴 Não Testado
                    </button>
                    <button class="status-btn ${card.status === 'em-teste' ? 'active-em-teste' : ''}" onclick="changeStatus('em-teste')">
                        🟡 Em Teste
                    </button>
                    <button class="status-btn ${card.status === 'testado' ? 'active-testado' : ''}" onclick="changeStatus('testado')">
                        🟢 Já Testado / Live Demo
                    </button>
                </div>
            `;

            modal.classList.add('active');
        }

        function triggerModalImageUpload() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.multiple = true;
            input.onchange = (e) => {
                if (e.target.files) {
                    Array.from(e.target.files).forEach(file => {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const card = findCard(currentCardId);
                            if (card) {
                                if (!card.images) card.images = [];
                                card.images.push(ev.target.result);
                                if (!card.thumbnail) {
                                    card.thumbnail = ev.target.result;
                                }
                                saveToStorage();
                                renderDashboard();
                                openCard(currentCardId);
                            }
                        };
                        reader.readAsDataURL(file);
                    });
                }
            };
            input.click();
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            currentCardId = null;
        }

        function changeStatus(newStatus) {
            if (!currentCardId) return;
            const card = findCard(currentCardId);
            if (!card) return;

            card.status = newStatus;
            saveToStorage();
            renderDashboard();

            // Update status buttons in-place without re-rendering the modal
            const statusClasses = {
                'nao-testado': 'active-nao-testado',
                'em-teste': 'active-em-teste',
                'testado': 'active-testado'
            };
            const statusOrder = ['nao-testado', 'em-teste', 'testado'];
            document.querySelectorAll('.status-btn').forEach((btn, i) => {
                btn.className = 'status-btn';
                if (statusOrder[i] === newStatus) {
                    btn.classList.add(statusClasses[newStatus]);
                }
            });

            // Regenerate QR with updated status
            const newQrDataUrl = generateCardQrDataUrl(card, 240);
            const qrImg = document.querySelector('.qr-preview img');
            if (qrImg && newQrDataUrl) {
                qrImg.src = newQrDataUrl;
            }
        }

        function findCard(id) {
            for (const zone of ZONES) {
                for (const sub of getZoneSubSections(zone)) {
                    const card = dashboardData[zone][sub].find(c => c.id === id);
                    if (card) return card;
                }
            }
            return null;
        }

        function deleteCard(id) {
            if (!confirm('Tem a certeza que deseja eliminar este card?')) return;

            for (const zone of ZONES) {
                for (const sub of getZoneSubSections(zone)) {
                    const idx = dashboardData[zone][sub].findIndex(c => c.id === id);
                    if (idx !== -1) {
                        dashboardData[zone][sub].splice(idx, 1);
                        saveToStorage();
                        renderDashboard();
                        return;
                    }
                }
            }
        }

        function showMoveMenu(id, btn) {
            event.stopPropagation();
            const menu = document.getElementById(`move-menu-${id}`);
            document.querySelectorAll('.move-menu').forEach(m => m.classList.remove('show'));
            menu.classList.toggle('show');
        }

        function moveCard(id, newZone) {
            event.stopPropagation();
            const card = findCard(id);
            if (!card) return;

            for (const zone of ZONES) {
                for (const sub of getZoneSubSections(zone)) {
                    const idx = dashboardData[zone][sub].findIndex(c => c.id === id);
                    if (idx !== -1) {
                        dashboardData[zone][sub].splice(idx, 1);
                    }
                }
            }

            card.zone = newZone;
            const targetSubSection = getZoneSubSections(newZone)[0] || DEFAULT_SUB_SECTIONS[0];
            if (!dashboardData[newZone][targetSubSection]) {
                dashboardData[newZone][targetSubSection] = [];
            }
            dashboardData[newZone][targetSubSection].push(card);

            saveToStorage();
            renderDashboard();
        }

        function addSubSectionToZone(zone) {
            const trimmedName = getNextZoneSectionNumber(zone);

            if (getZoneSubSections(zone).includes(trimmedName)) {
                alert('Já existe uma secção com esse nome.');
                return;
            }

            zoneSubSections[zone] = [...getZoneSubSections(zone), trimmedName];
            dashboardData[zone][trimmedName] = [];

            saveToStorage();
            renderDashboard();
        }

        function deleteSubSection(zone, subSectionName) {
            if (getZoneSubSections(zone).length === 1) {
                alert('Tem de existir pelo menos uma secção.');
                return;
            }

            const totalCards = ((dashboardData[zone] || {})[subSectionName] || []).length;

            const confirmMessage = totalCards > 0
                ? `Tem a certeza que deseja apagar a secção "${subSectionName}" da Zona ${zone}?\n\nIsto também irá remover ${totalCards} card(s) associados.`
                : `Tem a certeza que deseja apagar a secção "${subSectionName}"?`;

            if (!confirm(confirmMessage)) return;

            zoneSubSections[zone] = getZoneSubSections(zone).filter(sub => sub !== subSectionName);
            delete dashboardData[zone][subSectionName];

            saveToStorage();
            renderDashboard();
        }

        // ===================== EXCEL PARSING =====================
        function setupUpload() {
            const uploadFab = document.getElementById('uploadFab');
            const fileInput = document.getElementById('fileInput');

            uploadFab.addEventListener('click', () => {
                fileInput.value = '';
                fileInput.click();
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length) {
                    const selectedFile = e.target.files[0];
                    e.target.value = '';
                    handleFile(selectedFile);
                }
            });
        }

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];

                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });

                    console.log('=== RAW EXCEL DATA ===');
                    console.log(jsonData);

                    const getCell = (rowIdx) => {
                        if (rowIdx < jsonData.length && jsonData[rowIdx].length > 1) {
                            const val = jsonData[rowIdx][1];
                            return val !== undefined && val !== null ? String(val).trim() : '';
                        }
                        return '';
                    };

                    // ALL cell mappings as specified by user:
                    // B4  (index 3):  Nome Comercial Responsável
                    // B6  (index 5):  Nome Cliente/Revendedor
                    // B7  (index 6):  País
                    // B8  (index 7):  Nº. VAT
                    // B10 (index 9):  Procedimento (Live Demo / Testes Internos / Estudo)
                    // B11 (index 10): Idioma
                    // B13 (index 12): Utensílio(s)
                    // B14 (index 13): Quantidade Utensílios
                    // B15 (index 14): Trolley(s)
                    // B16 (index 15): Quantidade Trolleys
                    // B18 (index 17): Tipo de Sujidade
                    // B20 (index 19): Limpeza | Secagem
                    // B21 (index 20): Outro
                    // B24 (index 23): Observações
                    // B25 (index 24): Temperatura Máxima
                    // B27 (index 26): Data de Registo (DATE)
                    // B28 (index 27): Previsão de Conclusão (DATE)

                    const parsedData = {
                        comercial: getCell(3),           // B4
                        clienteNome: getCell(5),          // B6
                        pais: getCell(6),                 // B7
                        vat: getCell(7),                  // B8
                        procedimento: getCell(9),         // B10
                        idioma: getCell(10),              // B11
                        utensilios: getCell(12),          // B13
                        qtdUtensilios: getCell(13),       // B14
                        trolleys: getCell(14),            // B15
                        qtdTrolleys: getCell(15),         // B16
                        sujidade: getCell(17),            // B18
                        limpezaSecagem: getCell(19),      // B20
                        outro: getCell(20),               // B21
                        observacoes: getCell(23),         // B24
                        tempMax: getCell(24),             // B25
                        dataRegisto: excelDateToString(getCell(26)),         // B27 - converted to date
                        previsaoConclusao: excelDateToString(getCell(27))    // B28 - converted to date
                    };

                    console.log('=== PARSED DATA ===');
                    console.log(parsedData);

                    const zone = prompt('Escolha a Zona (A, B, C, D):', 'A')?.toUpperCase() || 'A';
                    const validZone = ZONES.includes(zone) ? zone : 'A';

                    const zoneSections = getZoneSubSections(validZone);
                    const subPrompt = `Escolha a Secção para a Zona ${validZone}:\n${zoneSections.map((sub) => `${sub}. ${sub}`).join('\n')}`;
                    const subChoice = prompt(subPrompt, '1') || '1';
                    const subSection = resolveZoneSectionChoice(subChoice, zoneSections);

                    const newCard = {
                        id: 'card_' + Date.now(),
                        zone: validZone,
                        status: 'nao-testado',
                        data: parsedData,
                        thumbnail: null,
                        images: [],
                        createdAt: new Date().toISOString()
                    };

                    if (!dashboardData[validZone][subSection]) {
                        dashboardData[validZone][subSection] = [];
                    }
                    dashboardData[validZone][subSection].push(newCard);
                    saveToStorage();
                    renderDashboard();

                    alert(`Card criado com sucesso na Zona ${validZone}, ${subSection}!\n\nCliente: ${parsedData.clienteNome || 'N/A'}\nComercial: ${parsedData.comercial || 'N/A'}\nRegisto: ${parsedData.dataRegisto || 'N/A'}\nConclusão: ${parsedData.previsaoConclusao || 'N/A'}`);

                } catch (err) {
                    console.error('Error parsing file:', err);
                    alert('Erro ao processar o ficheiro. Verifique o formato.\nDetalhe: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // ===================== STORAGE =====================
        function saveToStorage() {
            localStorage.setItem('dashboardData', JSON.stringify({
                dashboardData,
                zoneSubSections
            }));
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('dashboardData');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed && parsed.dashboardData && parsed.zoneSubSections) {
                        dashboardData = parsed.dashboardData;
                        zoneSubSections = parsed.zoneSubSections;
                    } else {
                        dashboardData = parsed;
                    }
                } catch (e) {
                    console.error('Error loading from storage:', e);
                }
            }
        }

        function clearAll() {
            if (!confirm('Tem a certeza que deseja limpar todos os dados?')) return;
            zoneSubSections = createEmptyZoneSubSections();
            dashboardData = createEmptyDashboard(zoneSubSections);
            saveToStorage();
            renderDashboard();
        }

        function exportData() {
            const dataStr = JSON.stringify(dashboardData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'dashboard_data.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Close modal on overlay click
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) {
                closeModal();
            }
        });

        // Close move menus when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.card-actions')) {
                document.querySelectorAll('.move-menu').forEach(m => m.classList.remove('show'));
            }
        });
    </script>
